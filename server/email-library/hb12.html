<!-- START: ID=HB12-v4.2 Member Since Ribbon -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" style="background: #F4F4F4">
  <tr>
    <td align="center" valign="top" background="./images/wsp-pattern-tile.png" style="background: url(./images/wsp-pattern-tile.png) repeat #F4F4F4; background-repeat: repeat;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td align="center" valign="top" style="padding: 40px;">
            <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td align="center" valign="middle">
                  <h1 style="color: #3D3D3D; font-weight: 400; font-size: 30px; line-height:38px;" class="hb-12-headline">{{greeting_headline}}</h1>
                </td>
              </tr>
              <tr>
                <td align="center" valign="middle" style="padding-top: 40px">
                  <p style="color: #3D3D3D;font-size: 20px; line-height:28px;">{{member_name}}</p>
                </td>
              </tr>
              <tr>
                <td align="center" valign="top" style="padding-top: 20px">
                  <table width="230" cellpadding="0" cellspacing="0" border="0" align="center">
                    <tr>
                      <td align="center" valign="middle">
                        <img src="./images/member_since.png" alt="Member Since" width="231" height="47" style="height: 47px; width: 231px; color:#3D3D3D;">
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              <tr>
                <td align="center" valign="middle" style="padding-top: 10px;">
                  <p style="color: #3D3D3D; font-size: 20px; line-height:28px;">{{member_since_year}}</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
