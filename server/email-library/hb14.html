<!-- START: ID=HB14-v4.2 Icon with Text -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" style="background: #F4F4F4">
  <tr>
    <td align="center" valign="middle" background="./images/wsp-pattern-tile.png" style="background: url(./images/wsp-pattern-tile.png) repeat #F4F4F4;background-repeat: repeat; padding: 40px;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <th width="110" align="left" valign="top" class="full-width-block pdbtm30 center-text">
            <img src="{{icon_image_url}}" alt="" width="80" height="80" style="color: #3D3D3D;" class="center-align">
          </th>
          <th width="430" align="center" valign="top" class="full-width-block">
            <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td valign="middle" class="center-text">
                  <h1 style="color: #3D3D3D;font-size: 24px;line-height:34px;">{{headline}}</h1>
                </td>
              </tr>
              <tr>
                <td valign="middle" class="center-text" style="padding-top: 10px">
                  <p style="color: #3D3D3D; font-size: 15px; line-height:22px;">{{body}}</p>
                </td>
              </tr>
              <tr>
                <td valign="top" class="center-button" style="padding-top: 30px">
                  <table role="none" cellpadding="0" cellspacing="0" border="0" width="164" height="44" style="width:164px;height:44px;border-radius: 3px;background:#006fcf;" class="button-primary-light">
                    <tr>
                      <td align="center" valign="middle">
                        <table role="none" cellpadding="0" cellspacing="0" border="0" style="border-radius: 3px; border: 2px solid #006fcf;mso-border-alt: 2px solid #006fcf;width:162px;height:42px">
                          <tr>
                            <td align="center" valign="middle" height="44">
                            <a href="{{button_url}}" target="_blank" aria-label="{{button_label}}, opens a new tab" style="color: #FFFFFF; display: inline-block; padding: 12px 0; text-decoration: none; width: 164px; font-size: 15px; line-height: 22px;">{{button_label}}</a>
                            </td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </th>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- END: HB14-v4.2 Icon with Text -->
