<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delma</title>
  <style>
    :root {
      --bg: #F5EDE4;              /* warm cream background */
      --panel: #FAF6F0;           /* warm white for cards — distinct from bg */
      --panel-soft: #F5EDE4;      /* matches bg for headers/footers */
      --ink: #1A1A1A;             /* dark text */
      --muted: #7a7168;           /* warm gray */
      --line: #D8CFC4;            /* warm borders/dividers */
      --accent: #8F0000;          /* dark red — CTAs, brand moments */
      --accent-soft: #f2e6e6;     /* light red wash for selected states */
      --accent-ink: #ffffff;      /* white text on red */
      --accent-hover: #6E0000;    /* darker red for hover */
      --positive: #2F6B5A;        /* success, confirmations */
      --positive-soft: #e6f2ee;
      --danger: #8F0000;          /* same as accent — red IS the brand */
      --danger-ink: #ffffff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --mono: "SFMono-Regular", "SF Mono", Consolas, Menlo, monospace;
      --sans: "Instrument Sans", "Avenir Next", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
    }

    body {
      height: 100vh;
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: transparent;
      color: inherit;
    }

    input, textarea {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus, textarea:focus {
      border-color: rgba(143, 0, 0, 0.25);
      box-shadow: 0 0 0 4px rgba(143, 0, 0, 0.06);
    }

    .app-shell {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      height: 100vh;
      padding: 0;
    }

    .panel {
      min-height: 0;
      background: var(--panel);
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .workspace-panel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 0;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .workspace-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .workspace-title {
      margin: 4px 0 0;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .workspace-copy {
      margin-top: 6px;
      max-width: 360px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .project-input {
      width: 220px;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 999px;
      background: #fff;
    }

    .header-select {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      min-width: 120px;
    }

    .header-select:focus {
      border-color: rgba(143, 0, 0, 0.25);
      outline: none;
    }

    .primary-btn,
    .secondary-btn {
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      font-size: 12px;
    }

    .primary-btn {
      background: var(--danger);
      color: var(--danger-ink);
    }

    .secondary-btn {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .tab-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .tab-bar {
      display: flex;
      gap: 8px;
      flex: 1 1 auto;
      overflow-x: auto;
      scrollbar-width: none;
      min-width: 0;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .view-tab {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 7px 12px;
      text-align: left;
      min-width: max-content;
      transition: background 160ms ease, border-color 160ms ease;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .view-tab.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(143, 0, 0, 0.15);
    }

    .view-tab.action-tab {
      flex: 0 0 auto;
    }

    .view-tab-title {
      font-size: 11px;
      font-weight: 600;
    }

    .view-tab-copy {
      display: none;
    }

    .diagram-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 20px 6px;
      height: 96px;
      overflow: hidden;
    }

    .meta-block {
      min-width: 0;
      overflow: hidden;
    }

    .meta-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-title {
      margin-top: 5px;
      font-size: 15px;
      letter-spacing: -0.03em;
    }

    .meta-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      max-width: 520px;
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .mode-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .mode-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .diagram-stage {
      min-height: 0;
      overflow: auto;
      padding: 8px 20px 18px;
      display: flex;
      justify-content: center;
    }

    .diagram-shell {
      width: 100%;
      max-width: 820px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      padding: 24px 28px;
      box-sizing: border-box;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .documentation-shell {
      width: 100%;
    }

    .markdown-body h1 { font-size: 22px; font-weight: 700; margin: 24px 0 8px; letter-spacing: -0.02em; }
    .markdown-body h2 { font-size: 17px; font-weight: 700; margin: 20px 0 6px; letter-spacing: -0.01em; }
    .markdown-body h3 { font-size: 14px; font-weight: 600; margin: 16px 0 4px; }
    .markdown-body p { margin: 6px 0; }
    .markdown-body ul, .markdown-body ol { margin: 6px 0; padding-left: 20px; }
    .markdown-body li { margin: 3px 0; }
    .markdown-body code { background: #f3f3f3; padding: 2px 5px; border-radius: 4px; font-size: 12px; }
    .markdown-body pre { background: #f6f6f6; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; margin: 8px 0; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
    .markdown-body th, .markdown-body td { border: 1px solid #e0e0e0; padding: 6px 10px; text-align: left; }
    .markdown-body th { background: #f6f6f6; font-weight: 600; }
    .markdown-body a { color: var(--accent); }
    .markdown-body hr { border: none; border-top: 1px solid var(--line); margin: 16px 0; }
    .markdown-body blockquote { border-left: 3px solid var(--positive); margin: 8px 0; padding: 4px 12px; color: #666; }
    .mermaid-inline { margin: 16px 0; padding: 12px; background: #fafafa; border-radius: 10px; border: 1px solid var(--line); text-align: center; }
    .mermaid-inline svg { max-width: 100%; height: auto; }
    .markdown-body details { margin: 12px 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .markdown-body details summary { padding: 10px 14px; cursor: pointer; font-weight: 600; font-size: 13px; background: #f9f9f9; user-select: none; }
    .markdown-body details summary:hover { background: #f0f0f0; }
    .markdown-body details[open] summary { border-bottom: 1px solid var(--line); }
    .markdown-body details > *:not(summary) { padding: 0 14px; }
    .markdown-body details > ul, .markdown-body details > p { padding: 4px 14px; }

    .diagram-editor {
      display: none;
      width: 100%;
      min-height: 524px;
      border: 0;
      resize: vertical;
      background: transparent;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
      outline: none;
      box-sizing: border-box;
    }

    .diagram-editor.visible {
      display: block;
    }

    #diagram-output {
      min-height: 100%;
    }

    #diagram-output svg {
      width: 100%;
      height: auto;
      max-width: none;
    }

    .diagram-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      padding: 32px;
    }

    .workspace-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 20px 18px;
      border-top: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .status-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
      overflow: hidden;
      background: #ffffff;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .chat-title {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.03em;
    }

    .chat-copy {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .chat-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .chat-status-label {
      color: var(--ink);
      font-weight: 500;
    }

    .activity-rail {
      display: none;
    }

    .messages {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 28px 28px 14px;
    }

    .message {
      border-radius: 0;
      padding: 0;
      line-height: 1.62;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      border: 0;
      background: transparent;
      max-width: 760px;
    }

    .message.assistant {
      color: var(--ink);
    }

    .message.assistant + .message.assistant {
      margin-top: -10px;
    }

    .message.error {
      padding: 12px 14px;
      border: 1px solid rgba(180, 70, 60, 0.18);
      border-radius: 12px;
      background: rgba(180, 70, 60, 0.06);
      color: #8e3a31;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 16px 22px 18px;
      background: #ffffff;
    }

    .composer-shell {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px 18px 12px;
      background: #fff;
    }

    .composer textarea {
      width: 100%;
      min-height: 104px;
      resize: none;
      border: 0;
      background: transparent;
      padding: 0;
      box-shadow: none;
      font-size: 15px;
    }

    .composer textarea:focus {
      box-shadow: none;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
    }

    .composer-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 420px;
    }

    .composer-toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .composer-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
    }

    .composer-model {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ink);
      font-weight: 500;
    }

    .send-pill {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }

    .hidden-ui {
      display: none;
    }

    .auth-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(246, 243, 244, 0.94);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .auth-overlay.visible {
      display: flex;
    }

    .auth-card {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .auth-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .auth-copy {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .auth-input {
      width: 100%;
      padding: 13px 15px;
      border-radius: 16px;
    }

    .auth-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .auth-error {
      min-height: 20px;
      color: #8a294f;
      font-size: 12px;
    }

    .logout-btn {
      display: none;
    }

    .logout-btn.visible {
      display: inline-flex;
    }

    @media (max-width: 760px) {
      body {
        height: auto;
        overflow: auto;
      }

      .app-shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }

      .controls {
        justify-content: flex-start;
      }

      .workspace-header,
      .workspace-footer,
      .composer-actions,
      .diagram-meta,
      .chat-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .diagram-meta {
        height: auto;
        overflow: visible;
      }

      .project-input {
        width: 100%;
      }

      .workspace-panel,
      .chat-panel {
        min-height: auto;
      }

      .diagram-shell {
        min-height: 420px;
      }

      #diagram-output {
        min-height: 420px;
      }
    }

    @media (max-width: 720px) {
      .workspace-header,
      .tab-row,
      .diagram-meta,
      .diagram-stage,
      .workspace-footer,
      .chat-header,
      .messages,
      .composer {
        padding-left: 14px;
        padding-right: 14px;
      }

      .tab-row {
        gap: 10px;
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .workspace-header,
      .chat-header {
        padding-top: 14px;
        padding-bottom: 12px;
      }

      .workspace-copy,
      .meta-copy,
      .chat-copy,
      .composer-hint {
        max-width: none;
      }

      .workspace-title,
      .chat-title {
        font-size: 15px;
      }

      .tab-bar {
        gap: 6px;
      }

      .view-tab {
        padding: 7px 10px;
      }

      .diagram-meta {
        gap: 10px;
      }

      .diagram-stage {
        padding-top: 6px;
        padding-bottom: 14px;
      }

      .diagram-shell {
        min-height: 320px;
        border-radius: 16px;
        padding: 12px;
      }

      #diagram-output {
        min-height: 100%;
      }

      .diagram-editor {
        min-height: 100%;
      }

      .diagram-empty {
        min-height: 260px;
        padding: 20px;
        font-size: 13px;
      }

      .workspace-footer {
        gap: 12px;
        padding-top: 10px;
        padding-bottom: 14px;
      }

      .status-strip {
        font-size: 12px;
        gap: 8px;
      }

      .footer-actions {
        width: 100%;
        justify-content: stretch;
      }

      .footer-actions .secondary-btn,
      .footer-actions .primary-btn {
        flex: 1 1 100%;
        justify-content: center;
        text-align: center;
      }

      .messages {
        gap: 16px;
        padding-top: 18px;
        padding-bottom: 10px;
      }

      .message {
        font-size: 13px;
        line-height: 1.58;
      }

      .composer {
        padding-top: 12px;
        padding-bottom: 14px;
      }

      .composer-shell {
        border-radius: 16px;
        padding: 14px 14px 10px;
      }

      .composer textarea {
        min-height: 88px;
        font-size: 14px;
      }

      .composer-actions {
        gap: 10px;
        margin-top: 12px;
      }

      .composer-toolbar {
        width: 100%;
        justify-content: space-between;
        gap: 10px;
      }

      .composer-model {
        font-size: 12px;
      }

      .chat-status {
        width: 100%;
        justify-content: space-between;
      }

      .auth-overlay {
        padding: 14px;
      }

      .auth-card {
        border-radius: 22px;
        padding: 20px;
      }

      .auth-title {
        font-size: 24px;
      }
    }

    @media (max-width: 480px) {
      .workspace-header,
      .tab-row,
      .diagram-meta,
      .diagram-stage,
      .workspace-footer,
      .chat-header,
      .messages,
      .composer {
        padding-left: 14px;
        padding-right: 14px;
      }

      .eyebrow,
      .meta-label {
        font-size: 10px;
      }

      .workspace-title,
      .chat-title {
        font-size: 14px;
      }

      .project-input,
      .secondary-btn,
      .primary-btn {
        width: 100%;
      }

      .controls {
        width: 100%;
      }

      .controls .secondary-btn {
        text-align: center;
      }

      .tab-row {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .tab-bar {
        width: 100%;
      }

      .view-tab-title {
        font-size: 10px;
      }

      .diagram-shell {
        min-height: 260px;
        padding: 10px;
      }

      #diagram-output {
        min-height: 100%;
      }

      .composer-shell {
        padding: 12px 12px 10px;
      }

      .composer-link,
      .composer-model,
      .composer-hint,
      .chat-copy,
      .workspace-copy,
      .meta-copy {
        font-size: 11px;
      }

      .send-pill {
        width: 34px;
        height: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="panel workspace-panel">
      <div class="workspace-header">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="eyebrow" style="margin-right:4px;">Delma</div>
          <select id="org-selector" class="header-select" aria-label="Organization"></select>
          <span style="color:var(--muted);font-size:14px;">/</span>
          <select id="project-selector" class="header-select" aria-label="Project"></select>
          <button id="new-project-btn" class="secondary-btn" style="font-size:11px;padding:6px 10px;">+ New</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button id="logout-btn" class="secondary-btn logout-btn" type="button">Log out</button>
        </div>
      </div>

      <div class="tab-row">
        <div id="view-tabs" class="tab-bar"></div>
      </div>

      <div class="diagram-meta" style="height:auto;padding:10px 20px 6px;">
        <div class="meta-block">
          <div id="view-title" class="meta-title" style="font-size:14px;"></div>
          <div id="view-description" class="meta-copy" style="margin-top:2px;"></div>
        </div>
        <div class="mode-toggle" id="mode-toggle" aria-label="Diagram Mode">
          <button id="view-mode-btn" class="mode-btn active" type="button">View</button>
          <button id="edit-mode-btn" class="mode-btn" type="button">Edit</button>
        </div>
      </div>

      <!-- Hidden elements used by JS but no longer in the visible header -->
      <input id="project-dir" type="hidden" />
      <button id="connect-btn" style="display:none;"></button>

      <div class="diagram-stage">
        <div class="diagram-shell">
          <div id="diagram-output" class="diagram-empty">Open a workspace to load Delma memory, connections, and diagrams.</div>
          <textarea id="diagram-editor" class="diagram-editor" spellcheck="false" aria-label="Mermaid Source"></textarea>
        </div>
      </div>

      <div class="workspace-footer">
        <div class="status-strip">
          <span id="workspace-status"></span>
        </div>
        <div class="footer-actions">
          <button id="reset-example-btn" class="secondary-btn" style="display:none;">Reset</button>
          <button id="save-workspace-btn" class="primary-btn">Save</button>
        </div>
      </div>
      <span id="sdk-status" style="display:none;"></span>
    </main>

    <div class="hidden-helpers">
      <div id="memory-list" style="display:none;"></div>
      <div id="history-list" style="display:none;"></div>
      <div id="sdk-body" style="display:none;"></div>
      <div id="activity-rail" style="display:none;"></div>
      <textarea id="input" style="display:none;" disabled></textarea>
      <button id="send-btn" style="display:none;" disabled></button>
    </div>
  </div>

  <div id="auth-overlay" class="auth-overlay" aria-hidden="true">
    <div class="auth-card">
      <h2 class="auth-title">Sign in to Delma</h2>
      <p id="auth-copy" class="auth-copy">Sign in with your email and password.</p>
      <form id="auth-form" class="auth-form">
        <input id="auth-username" class="auth-input" type="email" autocomplete="email" placeholder="Email" />
        <input id="auth-password" class="auth-input" type="password" autocomplete="current-password" placeholder="Password" />
        <div class="auth-actions">
          <div id="auth-error" class="auth-error"></div>
          <button id="auth-submit" class="primary-btn" type="submit">Enter Delma</button>
        </div>
      </form>
    </div>
  </div>

  <div class="hidden-ui" aria-hidden="true">
    <div id="project-pill"></div>
    <h1 id="workspace-title" style="display:none;"></h1>
    <div id="workspace-copy" style="display:none;"></div>
    <div id="history-pill"></div>
    <div id="diagram-toolbar-title"></div>
    <div id="diagram-toolbar-subtitle"></div>
    <input id="view-title-input" />
    <textarea id="view-description-input"></textarea>
    <textarea id="view-summary-input"></textarea>
    <div id="view-summary"></div>
    <textarea id="view-mermaid"></textarea>
    <button id="preview-btn"></button>
    <button id="save-view-btn"></button>
    <div id="save-note"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
