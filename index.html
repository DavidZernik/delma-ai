<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delma — Local</title>
  <style>
    :root {
      --cream: #FFFEEE;
      --accent: #8F0000;
      --ink: #1a1a1a;
      --muted: #6b5f5f;
      --border: rgba(0, 0, 0, 0.1);
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }
    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 24px 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 24px;
      height: 100vh;
    }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .chat-host { display: none; }
    }
    .main-col { min-width: 0; overflow-y: auto; }
    .chat-host {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      position: sticky;
      top: 20px;
    }
    /* Class selector beats user-agent [hidden] rule, so we have to
       re-state it ourselves — otherwise the chat panel shows up on
       the picker screen and squashes the layout. */
    .chat-host[hidden] { display: none; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--accent);
    }
    .folder-path {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: rgba(143, 0, 0, 0.06);
      border: 1px solid rgba(143, 0, 0, 0.15);
      padding: 6px 10px;
      border-radius: 8px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 16px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 2.5px solid transparent;
      cursor: pointer;
      margin-bottom: -1.5px;
      font-family: inherit;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab:hover:not(.active) { color: var(--ink); }
    .pane {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      min-height: 300px;
    }
    .pane h1, .pane h2, .pane h3 { margin: 0 0 12px; }
    .pane h2 { font-size: 20px; color: var(--accent); }
    .pane h3 { font-size: 15px; margin-top: 20px; }
    .pane p { line-height: 1.6; }
    .pane pre {
      background: #f8f6f0;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 12px;
      overflow-x: auto;
    }
    .pane code { font-family: var(--mono); font-size: 0.92em; background: rgba(0,0,0,0.04); padding: 1px 5px; border-radius: 3px; }
    .pane pre code { background: transparent; padding: 0; }
    .diagram-host {
      margin: 20px 0;
      padding: 20px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-align: center;
    }
    .picker {
      grid-column: 1 / -1;
      max-width: 620px;
      width: 100%;
      margin: 80px auto 0;
      padding: 32px 36px;
      background: #fff;
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(143, 0, 0, 0.08);
    }
    .picker h1 { font-size: 22px; color: var(--accent); margin: 0 0 6px; }
    .picker p { font-size: 14px; color: var(--muted); margin: 0 0 20px; line-height: 1.5; }
    .picker input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
    }
    .picker input:focus { outline: none; border-color: var(--accent); }
    .picker-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.9; }
    .recent-list { margin-top: 24px; }
    .recent-list h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .recent-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fff;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      color: var(--ink);
    }
    .recent-item:hover { border-color: var(--accent); background: rgba(143, 0, 0, 0.03); }
    .recent-item-name { font-weight: 700; color: var(--accent); font-family: inherit; font-size: 13px; }
    .recent-item-path { color: var(--muted); margin-top: 2px; word-break: break-all; }
    .empty-hint {
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }
    .error-banner {
      background: #fff4f0;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 14px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 13px;
    }
    .edit-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      font-family: inherit;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .edit-textarea {
      width: 100%;
      min-height: 360px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      resize: vertical;
      color: var(--ink);
      background: #fff;
    }
    .edit-textarea:focus { outline: none; border-color: var(--accent); }
    .info-banner {
      background: #f3fbf2;
      border: 1px solid #2F6B5A;
      color: #2F6B5A;
      padding: 10px 14px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 13px;
    }
    .account {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }
    .account-email {
      font-size: 12px;
      color: var(--muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar { gap: 14px; }

    /* Chat sidebar (minimal — no React to keep this page standalone). */
    .chat-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-head .title { font-weight: 700; font-size: 13px; letter-spacing: 0.02em; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 92%;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .chat-bubble.user { align-self: flex-end; background: var(--accent); color: #fff; }
    .chat-bubble.assistant { align-self: flex-start; background: #f4f0e6; color: var(--ink); }
    .chat-bubble.assistant pre {
      background: #fff;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 6px;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 12px;
    }
    .chat-bubble.assistant code { background: rgba(0,0,0,0.05); padding: 1px 4px; border-radius: 3px; font-family: var(--mono); font-size: 0.92em; }
    .chat-thinking { font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 8px; }
    .chat-suggest-card {
      align-self: stretch;
      background: #FFFEEE;
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .chat-suggest-prompt { font-size: 13px; color: #4a3a3a; margin-bottom: 4px; }
    .chat-suggest-summary { font-size: 14px; color: var(--ink); line-height: 1.4; margin-bottom: 10px; }
    .chat-suggest-buttons { display: flex; gap: 8px; }
    .btn-yes {
      background: #2F6B5A; color: #fff; border: none; border-radius: 999px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-no {
      background: var(--accent); color: #fff; border: none; border-radius: 999px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .chat-composer {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-composer textarea {
      width: 100%;
      min-height: 60px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: vertical;
    }
    .chat-composer textarea:focus { outline: none; border-color: var(--accent); }
    .chat-composer-row { display: flex; gap: 8px; }
    .chat-composer-row .email-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      font-family: inherit;
    }
    .chat-composer-row .email-btn:hover { border-color: var(--accent); color: var(--accent); }
    .chat-send {
      background: var(--accent); color: #fff; border: none; border-radius: 999px;
      padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: auto; font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="workspace" hidden class="main-col">
      <div class="topbar">
        <div class="brand">Delma</div>
        <div class="folder-path" id="folderPath"></div>
        <div class="account" id="accountWidget" hidden>
          <span class="account-email" id="accountEmail"></span>
          <button class="btn-secondary" id="signOutBtn">Sign out</button>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div id="editBar" class="edit-bar" hidden>
        <button class="btn-secondary" id="editToggleBtn">Edit</button>
        <span id="editStatus" style="font-size:12px;color:var(--muted);"></span>
      </div>
      <div class="pane" id="pane"></div>
    </div>

    <div id="chatHost" class="chat-host" hidden>
      <div class="chat-head">
        <span class="title">Delma Chat</span>
        <button class="btn-secondary" id="chatClearBtn">Clear</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-composer">
        <textarea id="chatInput" placeholder="Ask about the project, share a decision, propose a change…"></textarea>
        <div class="chat-composer-row">
          <button class="email-btn" id="openEmailBtn" title="Build a new email">✉ New Email</button>
          <button class="chat-send" id="chatSendBtn">Send</button>
        </div>
      </div>
    </div>

    <div id="login" class="picker" hidden></div>

    <div id="picker" class="picker">
      <h1>Open a project</h1>
      <p>Point Delma at any folder. It'll read (or create) <code>CLAUDE.md</code> at the root and render it as a live dashboard.</p>
      <input id="pathInput" type="text" placeholder="/Users/you/projects/my-project" autofocus />
      <div class="picker-actions">
        <button class="btn-primary" id="openBtn">Open</button>
      </div>
      <div id="pickerError"></div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>

  <!-- New Email modal — rendered by src/email-modal.js -->
  <div id="email-modal" class="email-modal" hidden>
    <div class="email-modal-backdrop"></div>
    <div class="email-modal-content">
      <div class="email-modal-header">
        <div>
          <div class="email-modal-eyebrow">NEW EMAIL</div>
          <div id="email-modal-step-label" class="email-modal-step-label">Step 1 of 5</div>
        </div>
        <button id="email-modal-close" class="email-modal-close" type="button" aria-label="Close">×</button>
      </div>
      <div id="email-modal-body" class="email-modal-body"></div>
      <div class="email-modal-footer">
        <button id="email-modal-back" class="email-modal-btn email-modal-btn-ghost" type="button">← Back</button>
        <div style="flex:1;"></div>
        <button id="email-modal-cancel" class="email-modal-btn email-modal-btn-ghost" type="button">Cancel</button>
        <button id="email-modal-next" class="email-modal-btn email-modal-btn-primary" type="button">Next →</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/local-main.js"></script>
</body>
</html>
